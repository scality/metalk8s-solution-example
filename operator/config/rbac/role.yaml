---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - metalk8s-solution-example.scality.com
  resources:
  - versionservers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - metalk8s-solution-example.scality.com
  resources:
  - versionservers/finalizers
  verbs:
  - update
- apiGroups:
  - metalk8s-solution-example.scality.com
  resources:
  - versionservers/status
  verbs:
  - get
  - patch
  - update
